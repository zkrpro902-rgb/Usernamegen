<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Username Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--panel:#0f0f17;--panel2:#13131e;--border:#1e1e2e;--border2:#2a2a3e;
  --acc:#00ff88;--acc2:#00cc6a;--red:#ff3355;--yellow:#ffcc00;--blue:#4488ff;
  --text:#e0e0f0;--muted:#4a4a6a;--muted2:#6a6a8a;
  --font:'Share Tech Mono',monospace;--font2:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

/* Scanlines */
body::before{content:’’;position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.01) 2px,rgba(0,255,136,0.01) 4px);pointer-events:none;z-index:999;}

.wrap{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:100vh;}

/* LEFT PANEL */
.left{padding:24px;border-right:1px solid var(–border);}

.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(–border);}
.logo{width:32px;height:32px;background:var(–acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo svg{width:20px;height:20px;fill:#0a0a0f;}
.title{font-family:var(–font2);font-size:1.1rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(–acc);}

/* Webhook input */
.input-row{display:flex;gap:8px;margin-bottom:20px;}
.inp{flex:1;background:var(–panel2);border:1px solid var(–border2);border-radius:6px;padding:10px 14px;color:var(–text);font-family:var(–font);font-size:0.75rem;outline:none;transition:border-color 0.2s;}
.inp:focus{border-color:var(–acc);}
.inp::placeholder{color:var(–muted);}
.save-btn{padding:10px 16px;background:var(–panel2);border:1px solid var(–border2);border-radius:6px;color:var(–acc);font-family:var(–font2);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.save-btn:hover{background:var(–acc);color:#0a0a0f;border-color:var(–acc);}
.save-btn.saved{background:var(–acc);color:#0a0a0f;border-color:var(–acc);}

/* Type grid */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px;}
.type-btn{padding:10px 8px;background:var(–panel2);border:1px solid var(–border2);border-radius:6px;color:var(–muted2);font-family:var(–font2);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.18s;text-align:center;letter-spacing:0.05em;}
.type-btn:hover{border-color:var(–acc);color:var(–acc);}
.type-btn.active{background:rgba(0,255,136,0.08);border-color:var(–acc);color:var(–acc);}

/* Options */
.options-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.opt{display:flex;align-items:center;gap:7px;padding:8px 14px;background:var(–panel2);border:1px solid var(–border2);border-radius:6px;cursor:pointer;font-size:0.75rem;color:var(–muted2);transition:all 0.18s;user-select:none;}
.opt.active{border-color:var(–acc);color:var(–acc);background:rgba(0,255,136,0.06);}
.opt-dot{width:8px;height:8px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;}
.opt.active .opt-dot{background:currentColor;}

/* Action buttons */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.start-btn{padding:13px;background:rgba(0,255,136,0.08);border:1px solid var(–acc);border-radius:8px;color:var(–acc);font-family:var(–font2);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.1em;text-transform:uppercase;}
.start-btn:hover{background:var(–acc);color:#0a0a0f;}
.start-btn:disabled{opacity:0.3;cursor:not-allowed;}
.stop-btn{padding:13px;background:rgba(255,51,85,0.08);border:1px solid var(–red);border-radius:8px;color:var(–red);font-family:var(–font2);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.1em;text-transform:uppercase;}
.stop-btn:hover{background:var(–red);color:white;}

/* Progress */
.prog-section{margin-bottom:20px;}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(–muted);}
.prog-pct{font-size:0.9rem;font-weight:700;color:var(–acc);}
.prog-bg{height:2px;background:var(–border2);border-radius:2px;overflow:hidden;margin-bottom:12px;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(–acc),var(–blue));border-radius:2px;transition:width 0.3s;width:0%;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(–panel2);border:1px solid var(–border2);border-radius:8px;padding:14px 10px;text-align:center;}
.stat-num{font-size:1.5rem;font-weight:700;font-family:var(–font2);margin-bottom:3px;}
.stat-num.blue{color:var(–blue);}
.stat-num.green{color:var(–acc);}
.stat-num.red{color:var(–red);}
.stat-lbl{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(–muted);}

/* Status bar */
.status-bar{margin-top:16px;padding:8px 14px;background:var(–panel2);border:1px solid var(–border2);border-radius:6px;font-size:0.7rem;color:var(–muted2);display:flex;align-items:center;gap:8px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(–muted);flex-shrink:0;}
.status-dot.running{background:var(–acc);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* RIGHT PANEL */
.right{background:var(–panel);display:flex;flex-direction:column;}
.right-header{padding:16px 20px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;}
.right-title{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(–muted);}
.right-count{font-size:0.7rem;color:var(–acc);}

.results-wrap{flex:1;overflow-y:auto;padding:16px;}
.results-wrap::-webkit-scrollbar{width:3px;}
.results-wrap::-webkit-scrollbar-thumb{background:var(–border2);border-radius:3px;}

/* Result items */
.result-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;margin-bottom:6px;animation:slideIn 0.2s ease;border:1px solid transparent;cursor:pointer;transition:all 0.15s;}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.result-item.available{background:rgba(0,255,136,0.06);border-color:rgba(0,255,136,0.2);}
.result-item.available:hover{background:rgba(0,255,136,0.12);border-color:var(–acc);}
.result-item.taken{background:rgba(255,51,85,0.04);border-color:rgba(255,51,85,0.1);opacity:0.5;}
.result-item.error{background:rgba(255,204,0,0.04);border-color:rgba(255,204,0,0.1);opacity:0.4;}
.result-name{font-size:0.92rem;font-weight:600;font-family:var(–font2);}
.result-item.available .result-name{color:var(–acc);}
.result-item.taken .result-name{color:var(–red);text-decoration:line-through;}
.result-item.error .result-name{color:var(–yellow);}
.result-badge{font-size:0.6rem;letter-spacing:0.1em;padding:3px 8px;border-radius:4px;font-family:var(–font2);font-weight:700;}
.result-item.available .result-badge{background:rgba(0,255,136,0.15);color:var(–acc);}
.result-item.taken .result-badge{background:rgba(255,51,85,0.1);color:var(–red);}
.result-item.error .result-badge{background:rgba(255,204,0,0.1);color:var(–yellow);}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(–muted);text-align:center;padding:40px;}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.3;}
.empty-txt{font-size:0.72rem;line-height:1.8;letter-spacing:0.05em;}

/* Copied toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(–acc);color:#0a0a0f;padding:10px 20px;border-radius:8px;font-family:var(–font2);font-weight:700;font-size:0.85rem;opacity:0;transform:translateY(10px);transition:all 0.2s;pointer-events:none;z-index:1000;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:700px){
.wrap{grid-template-columns:1fr;}
.right{min-height:400px;}
.type-grid{grid-template-columns:repeat(2,1fr);}
}
</style>

<script>
// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
function saveWh(){localStorage.setItem('wh',document.getElementById('webhookInp').value);}
function saveTk(){localStorage.setItem('tk',document.getElementById('tokenInp').value);}
function saveWhConfirm(){saveWh();const b=document.getElementById('whBtn');b.textContent='✓ Saved';b.classList.add('saved');setTimeout(()=>{b.textContent='Save';b.classList.remove('saved');},1500);}
function saveTkConfirm(){saveTk();const b=document.getElementById('tkBtn');b.textContent='✓ Saved';b.classList.add('saved');setTimeout(()=>{b.textContent='Save';b.classList.remove('saved');},1500);}

window.addEventListener('DOMContentLoaded',()=>{
  const wh=localStorage.getItem('wh');if(wh)document.getElementById('webhookInp').value=wh;
  const tk=localStorage.getItem('tk');if(tk)document.getElementById('tokenInp').value=tk;
});

function getWh(){return document.getElementById('webhookInp').value.trim()||localStorage.getItem('wh')||'';}
function getTk(){return document.getElementById('tokenInp').value.trim()||localStorage.getItem('tk')||'';}

// ══════════════════════════════════════════════════════
// TYPES
// ══════════════════════════════════════════════════════
function toggleType(el){el.classList.toggle('active');}
function getTypes(){return[...document.querySelectorAll('.type-btn.active')].map(b=>b.dataset.type);}

// ══════════════════════════════════════════════════════
// GÉNÉRATEUR
// ══════════════════════════════════════════════════════
const V=[...'aeiou'],C=[...'bcdfghjklmnpqrstvwxyz'],D=[...'0123456789'],A=[...'abcdefghijklmnopqrstuvwxyz'];
const P3=['CVC','VCC','CCV','CVV'],P4=['CVCC','CCVC','CVVC','CCVV'];

function genByType(type){
  switch(type){
    case '3L': return genPattern(P3,false);
    case '4L': return genPattern(P4,false);
    case '3C': return Array.from({length:3},()=>A[~~(Math.random()*A.length)]).join('');
    case '4C': return Array.from({length:4},()=>A[~~(Math.random()*A.length)]).join('');
    case '4N': {
      const first=A[~~(Math.random()*A.length)];
      const rest=Array.from({length:3},()=>[...A,...D][~~(Math.random()*(A.length+D.length))]).join('');
      return first+rest;
    }
    case 'Semi3L': {
      const p=P3[~~(Math.random()*P3.length)];
      let n='';
      for(const c of p){
        if(c==='C')n+=Math.random()<0.3?D[~~(Math.random()*D.length)]:C[~~(Math.random()*C.length)];
        else n+=V[~~(Math.random()*V.length)];
      }
      return n;
    }
    default: return genPattern(P4,false);
  }
}

function genPattern(patterns,useD){
  const p=patterns[~~(Math.random()*patterns.length)];
  let n='';
  for(const c of p){
    if(c==='C')n+=C[~~(Math.random()*C.length)];
    else if(c==='V')n+=V[~~(Math.random()*V.length)];
    else n+=D[~~(Math.random()*D.length)];
  }
  return n;
}

// ══════════════════════════════════════════════════════
// CHECKER — 3 APIs en parallèle
// ══════════════════════════════════════════════════════
async function checkName(name){
  return new Promise(async(resolve)=>{
    let done=false;
    const finish=(s)=>{if(!done&&(s==='available'||s==='taken')){done=true;resolve(s);}};
    await Promise.allSettled([
      checkLixqa(name).then(finish),
      checkCloudflare(name).then(finish),
      checkDiscord(name).then(finish),
    ]);
    if(!done)resolve('error');
  });
}

async function checkLixqa(name){
  try{
    const r=await fetch(`https://api.lixqa.de/v3/discord/pomelo/${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(4000)});
    if(r.status===429)return'ratelimit';
    if(!r.ok)return'error';
    const d=await r.json();
    if(typeof d.available==='boolean')return d.available?'available':'taken';
    return'error';
  }catch{return'error';}
}

async function checkCloudflare(name){
  try{
    const proxy = getNextProxy();
    const url = proxy
      ? `https://muddy-thunder-0302.zkrpro902.workers.dev/?name=${encodeURIComponent(name)}&proxy=${encodeURIComponent(proxy)}`
      : `https://muddy-thunder-0302.zkrpro902.workers.dev/?name=${encodeURIComponent(name)}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(4000)});
    if(r.status===429)return'ratelimit';
    if(!r.ok)return'error';
    const d=await r.json();
    return(d.status==='available'||d.status==='taken')?d.status:'error';
  }catch{return'error';}
}

async function checkDiscord(name){
  try{
    const tk=getTk();
    const headers={'Content-Type':'application/json'};
    if(tk)headers['Authorization']=tk;
    const ep=tk?'https://discord.com/api/v9/users/@me/pomelo-attempt':'https://discord.com/api/v9/unique-usernames/username-attempt-unauthed';
    const r=await fetch(ep,{method:'POST',headers,body:JSON.stringify({username:name}),signal:AbortSignal.timeout(4000)});
    if(r.status===429)return'ratelimit';
    if(!r.ok)return'error';
    const d=await r.json();
    return d.taken===false?'available':'taken';
  }catch{return'error';}
}

// ══════════════════════════════════════════════════════
// WEBHOOK
// ══════════════════════════════════════════════════════
async function sendWh(name){
  const url=getWh();if(!url)return;
  try{
    await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      username:'PseudoChecker',
      embeds:[{title:'✅ Pseudo disponible !',description:`\`${name}\` est libre !`,color:65416,fields:[{name:'Longueur',value:`${name.length}L`,inline:true},{name:'Pseudo',value:`\`${name}\``,inline:true}],timestamp:new Date().toISOString()}]
    })});
  }catch{}
}

// ══════════════════════════════════════════════════════
// CHECKER LOOP
// ══════════════════════════════════════════════════════
let running=false,stopFlag=false,checked=0,avail=0,taken=0,hasResults=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function setStatus(txt,isRunning){
  document.getElementById('statusTxt').textContent=txt;
  document.getElementById('statusDot').className='status-dot'+(isRunning?' running':'');
}

function updateStats(){
  document.getElementById('stChecked').textContent=checked;
  document.getElementById('stAvail').textContent=avail;
  document.getElementById('stTaken').textContent=taken;
  document.getElementById('rightCount').textContent=checked+' résultats';
}

function addResult(name,status){
  if(!hasResults){
    document.getElementById('resultsWrap').innerHTML='';
    hasResults=true;
  }
  const wrap=document.getElementById('resultsWrap');
  const item=document.createElement('div');
  item.className=`result-item ${status}`;
  const labels={available:'DISPO',taken:'PRIS',error:'ERREUR'};
  item.innerHTML=`<span class="result-name">${name}</span><span class="result-badge">${labels[status]||'ERR'}</span>`;
  if(status==='available'){
    wrap.insertBefore(item,wrap.firstChild);
    item.onclick=()=>copyName(name);
  } else {
    wrap.appendChild(item);
  }
}

async function startCheck(){
  if(running)return;
  const types=getTypes();
  if(!types.length){alert('Sélectionne au moins un type !');return;}
  running=true;stopFlag=false;checked=0;avail=0;taken=0;hasResults=false;
  document.getElementById('resultsWrap').innerHTML='<div class="empty-state"><div class="empty-icon" style="animation:blink 0.5s infinite">⚡</div></div>';
  document.getElementById('startBtn').disabled=true;
  setStatus('Checking en cours...', true);

  const BATCH=5;
  while(!stopFlag){
    const batch=[];
    for(let i=0;i<BATCH;i++){
      const type=types[~~(Math.random()*types.length)];
      const name=genByType(type);
      batch.push((async()=>{
        const s=await checkName(name);
        checked++;
        if(s==='available'){avail++;sendWh(name);}
        else if(s==='taken')taken++;
        addResult(name,s);
        updateStats();
        setStatus(`Check "${name}" · ${avail} dispo`,true);
      })());
    }
    await Promise.all(batch);
    await sleep(400);
  }

  running=false;
  document.getElementById('startBtn').disabled=false;
  setStatus(`Arrêté · ${avail} dispo sur ${checked} checkés`,false);
}

function stopCheck(){
  stopFlag=true;
  setStatus('Arrêt en cours...',false);
}

// ══════════════════════════════════════════════════════
// PROXIES — Proxyscrape auto fetch
// ══════════════════════════════════════════════════════
let proxies = [];
let proxyIndex = 0;

async function fetchProxies() {
  const btn = document.getElementById('proxyBtn');
  btn.textContent = '...';
  btn.disabled = true;
  setStatus('Récupération des proxies...', true);
  try {
    // Via Cloudflare Worker — pas de CORS
    const r = await fetch('https://muddy-thunder-0302.zkrpro902.workers.dev/?proxies=1', {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error('Worker inaccessible');
    const data = await r.json();
    proxies = data.proxies || [];
    if (!proxies.length) throw new Error('Aucun proxy récupéré');
    proxyIndex = 0;
    document.getElementById('proxyInp').value = proxies.length + ' proxies chargés';
    document.getElementById('proxyStatus').textContent = '✅ ' + proxies.length + ' proxies prêts · rotation auto';
    document.getElementById('proxyStatus').style.color = 'var(--acc)';
    btn.textContent = '✓ OK';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Fetch'; btn.classList.remove('saved'); btn.disabled = false; }, 2000);
    setStatus(proxies.length + ' proxies chargés', false);
  } catch(e) {
    document.getElementById('proxyStatus').textContent = '⚠️ ' + e.message + ' — checker sans proxy';
    document.getElementById('proxyStatus').style.color = 'var(--yellow)';
    btn.textContent = 'Retry';
    btn.disabled = false;
    setStatus('Mode direct (sans proxy)', false);
  }
}

function getNextProxy() {
  if (!proxies.length) return null;
  const p = proxies[proxyIndex % proxies.length];
  proxyIndex++;
  return p;
}

// COPY

function copyName(name){
  navigator.clipboard.writeText(name).catch(()=>{
    const t=document.createElement('textarea');t.value=name;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  const toast=document.getElementById('toast');
  toast.textContent=`"${name}" copié !`;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1800);
}
