<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--panel:#0f0f17;--panel2:#13131e;--border:#1e1e2e;--border2:#2a2a3e;
  --acc:#00ff88;--red:#ff3355;--yellow:#ffcc00;--blue:#4488ff;--purple:#9b59ff;--orange:#ff6b35;
  --text:#e0e0f0;--muted:#4a4a6a;--muted2:#6a6a8a;
  --font:'Share Tech Mono',monospace;--font2:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.01) 2px,rgba(0,255,136,0.01) 4px);pointer-events:none;z-index:999;}
.wrap{display:grid;grid-template-columns:1fr 370px;gap:0;min-height:100vh;}
.left{padding:18px;border-right:1px solid var(--border);overflow-y:auto;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.logo{width:28px;height:28px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo svg{width:16px;height:16px;fill:#0a0a0f;}
.title{font-family:var(--font2);font-size:0.95rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--acc);}
.tabs{display:flex;gap:3px;margin-bottom:12px;background:var(--panel2);padding:3px;border-radius:7px;border:1px solid var(--border2);}
.tab{flex:1;padding:6px;background:transparent;border:none;border-radius:5px;color:var(--muted2);font-family:var(--font2);font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.18s;text-align:center;}
.tab.active{background:var(--panel);color:var(--acc);border:1px solid var(--border2);}
.platform-tabs{display:flex;gap:5px;margin-bottom:12px;}
.ptab{flex:1;padding:7px 3px;background:var(--panel2);border:1px solid var(--border2);border-radius:7px;color:var(--muted2);font-family:var(--font2);font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.18s;text-align:center;}
.ptab.active[data-p="discord"]{background:rgba(88,101,242,0.12);border-color:#5865f2;color:#5865f2;}
.ptab.active[data-p="guns"]{background:rgba(255,107,53,0.12);border-color:var(--orange);color:var(--orange);}
.ptab.active[data-p="msa"]{background:rgba(155,89,255,0.12);border-color:var(--purple);color:var(--purple);}
.ptab.active[data-p="sellix"]{background:rgba(68,136,255,0.12);border-color:var(--blue);color:var(--blue);}
.ptab.active[data-p="all"]{background:rgba(0,255,136,0.1);border-color:var(--acc);color:var(--acc);}
.input-row{display:flex;gap:7px;margin-bottom:10px;}
.inp{flex:1;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:8px 11px;color:var(--text);font-family:var(--font);font-size:0.7rem;outline:none;transition:border-color 0.2s;}
.inp:focus{border-color:var(--acc);}
.inp::placeholder{color:var(--muted);}
.inp-area{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:8px 11px;color:var(--text);font-family:var(--font);font-size:0.7rem;outline:none;transition:border-color 0.2s;resize:vertical;min-height:80px;}
.inp-area:focus{border-color:var(--acc);}
.inp-area::placeholder{color:var(--muted);}
.save-btn{padding:8px 12px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;color:var(--acc);font-family:var(--font2);font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.save-btn:hover,.save-btn.saved{background:var(--acc);color:#0a0a0f;border-color:var(--acc);}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px;}
.type-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:10px;}
.type-btn{padding:7px 4px;background:var(--panel2);border:1px solid var(--border2);border-radius:5px;color:var(--muted2);font-family:var(--font2);font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.18s;text-align:center;}
.type-btn:hover{border-color:var(--acc);color:var(--acc);}
.type-btn.active{background:rgba(0,255,136,0.08);border-color:var(--acc);color:var(--acc);}
/* Options row */
.opts-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.opt-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--panel2);border:1px solid var(--border2);border-radius:5px;font-size:0.65rem;color:var(--muted2);cursor:pointer;user-select:none;transition:all 0.18s;}
.opt-pill.active{border-color:var(--acc);color:var(--acc);}
.opt-pill input[type=number]{width:38px;background:transparent;border:none;color:var(--acc);font-family:var(--font);font-size:0.65rem;outline:none;text-align:center;}
.toggle{position:relative;width:30px;height:16px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:16px;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:var(--acc);}
.toggle-slider:before{content:'';position:absolute;width:10px;height:10px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.toggle-slider:before{transform:translateX(14px);}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;margin-top:10px;}
.start-btn{padding:10px;background:rgba(0,255,136,0.08);border:1px solid var(--acc);border-radius:7px;color:var(--acc);font-family:var(--font2);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.08em;text-transform:uppercase;}
.start-btn:hover{background:var(--acc);color:#0a0a0f;}
.start-btn:disabled{opacity:0.3;cursor:not-allowed;}
.stop-btn{padding:10px;background:rgba(255,51,85,0.08);border:1px solid var(--red);border-radius:7px;color:var(--red);font-family:var(--font2);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.08em;text-transform:uppercase;}
.stop-btn:hover{background:var(--red);color:white;}
.btn-row{display:flex;gap:6px;margin-bottom:10px;}
.small-btn{flex:1;padding:7px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-family:var(--font2);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.18s;text-align:center;}
.small-btn:hover{border-color:var(--acc);color:var(--acc);}
.small-btn.blue{color:var(--blue);border-color:rgba(68,136,255,0.3);}
.small-btn.blue:hover{background:var(--blue);color:white;}
.speed-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;margin-bottom:10px;font-size:0.62rem;color:var(--muted2);}
.speed-val{color:var(--acc);font-weight:700;font-family:var(--font2);}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.stat-box{background:var(--panel2);border:1px solid var(--border2);border-radius:7px;padding:9px 5px;text-align:center;}
.stat-num{font-size:1.2rem;font-weight:700;font-family:var(--font2);margin-bottom:1px;}
.stat-num.blue{color:var(--blue);}
.stat-num.green{color:var(--acc);}
.stat-num.red{color:var(--red);}
.stat-num.yellow{color:var(--yellow);}
.stat-lbl{font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.status-bar{padding:7px 11px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;font-size:0.64rem;color:var(--muted2);display:flex;align-items:center;gap:7px;margin-top:8px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.status-dot.running{background:var(--acc);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
/* Right */
.right{background:var(--panel);display:flex;flex-direction:column;}
.right-header{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px;}
.right-top{display:flex;align-items:center;justify-content:space-between;width:100%;}
.right-title{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.right-actions{display:flex;gap:5px;align-items:center;}
.right-count{font-size:0.65rem;color:var(--acc);}
.icon-btn{padding:3px 8px;background:var(--panel2);border:1px solid var(--border2);border-radius:4px;color:var(--muted2);font-size:0.62rem;cursor:pointer;transition:all 0.15s;font-family:var(--font2);}
.icon-btn:hover{border-color:var(--acc);color:var(--acc);}
/* Filter tabs */
.filter-row{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.filter-btn{flex:1;padding:5px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--muted2);font-family:var(--font2);font-size:0.65rem;cursor:pointer;transition:all 0.15s;text-align:center;}
.filter-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(0,255,136,0.06);}
.results-wrap{flex:1;overflow-y:auto;padding:11px;}
.results-wrap::-webkit-scrollbar{width:3px;}
.results-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.result-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;margin-bottom:4px;animation:slideIn 0.2s ease;border:1px solid transparent;cursor:pointer;transition:all 0.15s;}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.result-item.available{background:rgba(0,255,136,0.06);border-color:rgba(0,255,136,0.2);}
.result-item.available:hover{background:rgba(0,255,136,0.12);border-color:var(--acc);}
.result-item.taken{background:rgba(255,51,85,0.03);opacity:0.4;}
.result-item.error{background:rgba(255,204,0,0.02);opacity:0.28;}
.result-left{display:flex;align-items:center;gap:6px;}
.result-name{font-size:0.85rem;font-weight:600;font-family:var(--font2);}
.result-item.available .result-name{color:var(--acc);}
.result-item.taken .result-name{color:var(--red);text-decoration:line-through;}
.result-item.error .result-name{color:var(--yellow);}
.result-plat{font-size:0.46rem;padding:2px 4px;border-radius:3px;font-family:var(--font2);font-weight:700;}
.result-badge{font-size:0.54rem;padding:2px 6px;border-radius:3px;font-family:var(--font2);font-weight:700;}
.result-item.available .result-badge{background:rgba(0,255,136,0.15);color:var(--acc);}
.result-item.taken .result-badge{background:rgba(255,51,85,0.1);color:var(--red);}
.result-item.error .result-badge{background:rgba(255,204,0,0.1);color:var(--yellow);}
/* History panel */
.hist-panel{padding:11px;}
.hist-session{background:var(--panel2);border:1px solid var(--border2);border-radius:7px;padding:10px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.hist-session:hover{border-color:var(--acc);}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.hist-date{font-size:0.62rem;color:var(--muted2);}
.hist-stats{font-size:0.62rem;color:var(--acc);}
.hist-names{font-size:0.68rem;color:var(--text);font-family:var(--font2);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:var(--muted);text-align:center;}
.empty-icon{font-size:1.6rem;margin-bottom:8px;opacity:0.3;}
.empty-txt{font-size:0.66rem;line-height:1.8;}
.toast{position:fixed;bottom:16px;right:16px;background:var(--acc);color:#0a0a0f;padding:8px 16px;border-radius:6px;font-family:var(--font2);font-weight:700;font-size:0.78rem;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;z-index:1000;}
.toast.show{opacity:1;transform:translateY(0);}
@media(max-width:680px){.wrap{grid-template-columns:1fr;}.right{min-height:300px;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 71 55"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.5.6a.2.2 0 0 0-.2.1 40.7 40.7 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0 37.4 37.4 0 0 0-1.8-3.7.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.8 4.9a.2.2 0 0 0-.1.1C1.6 18.3-.9 31.4.3 44.3a.2.2 0 0 0 .1.1 58.8 58.8 0 0 0 17.7 8.9.2.2 0 0 0 .2-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.3l1.1-.9a.2.2 0 0 1 .2 0c11.5 5.3 24 5.3 35.4 0a.2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .3 36 36 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47 47 0 0 0 3.6 5.9.2.2 0 0 0 .2.1 58.6 58.6 0 0 0 17.8-8.9.2.2 0 0 0 .1-.1c1.5-15-2.5-28-10.5-39.5a.2.2 0 0 0-.1 0z"/></svg>
      </div>
      <span class="title">Username Checker</span>
    </div>

    <!-- Mode tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchMode('auto')" id="tabAuto">&#9889; Auto</button>
      <button class="tab" onclick="switchMode('liste')" id="tabListe">&#128203; Liste</button>
    </div>

    <!-- Platform tabs -->
    <div class="platform-tabs">
      <div class="ptab active" data-p="discord" onclick="switchPlatform('discord')">Discord</div>
      <div class="ptab" data-p="guns" onclick="switchPlatform('guns')">Guns</div>
      <div class="ptab" data-p="msa" onclick="switchPlatform('msa')">MSA</div>
      <div class="ptab" data-p="sellix" onclick="switchPlatform('sellix')">Sellix</div>
      <div class="ptab" data-p="all" onclick="switchPlatform('all')">&#9733; ALL</div>
    </div>

    <!-- Webhook -->
    <div class="input-row">
      <input class="inp" id="webhookInp" placeholder="Webhook URL Discord..." oninput="saveWh()">
      <button class="save-btn" id="whBtn" onclick="saveWhConfirm()">Save</button>
    </div>
    <div class="input-row" id="tokenRow">
      <input class="inp" id="tokenInp" type="password" placeholder="Token utilisateur (optionnel)..." oninput="saveTk()">
      <button class="save-btn" id="tkBtn" onclick="saveTkConfirm()">Save</button>
    </div>

    <!-- Options -->
    <div class="opts-row">
      <label class="opt-pill" id="soundPill">
        <label class="toggle"><input type="checkbox" id="soundToggle" checked><div class="toggle-slider"></div></label>
        Son
      </label>
      <div class="opt-pill active" id="stopPill" onclick="toggleStopAt()">
        Stop à <input type="number" id="stopAt" value="5" min="1" max="100" onclick="e=>e.stopPropagation()"> dispos
      </div>
      <label class="opt-pill">
        <label class="toggle"><input type="checkbox" id="stopToggle"><div class="toggle-slider"></div></label>
        Auto-stop
      </label>
    </div>

    <!-- AUTO MODE -->
    <div id="modeAuto">
      <div id="typesDiscord"><div class="type-grid">
        <div class="type-btn active" data-type="3L" onclick="toggleType(this)">3L</div>
        <div class="type-btn active" data-type="4L" onclick="toggleType(this)">4L</div>
        <div class="type-btn" data-type="3C" onclick="toggleType(this)">3C</div>
        <div class="type-btn" data-type="4C" onclick="toggleType(this)">4C</div>
        <div class="type-btn" data-type="4N" onclick="toggleType(this)">4N</div>
        <div class="type-btn" data-type="Semi3L" onclick="toggleType(this)">Semi 3L</div>
      </div></div>
      <div id="typesGuns" style="display:none"><div class="type-grid-2">
        <div class="type-btn active" data-type="g3L" onclick="toggleType(this)">3L</div>
        <div class="type-btn active" data-type="g4L" onclick="toggleType(this)">4L</div>
        <div class="type-btn" data-type="g3C" onclick="toggleType(this)">3C</div>
        <div class="type-btn" data-type="g4C" onclick="toggleType(this)">4C</div>
      </div></div>
      <div id="typesMsa" style="display:none"><div class="type-grid-2">
        <div class="type-btn active" data-type="m3L" onclick="toggleType(this)">3L</div>
        <div class="type-btn active" data-type="m4L" onclick="toggleType(this)">4L</div>
        <div class="type-btn" data-type="m3C" onclick="toggleType(this)">3C</div>
        <div class="type-btn" data-type="m4C" onclick="toggleType(this)">4C</div>
      </div></div>
      <div id="typesSellix" style="display:none"><div class="type-grid-2">
        <div class="type-btn active" data-type="s3L" onclick="toggleType(this)">3L</div>
        <div class="type-btn active" data-type="s4L" onclick="toggleType(this)">4L</div>
        <div class="type-btn" data-type="s3C" onclick="toggleType(this)">3C</div>
        <div class="type-btn" data-type="s4C" onclick="toggleType(this)">4C</div>
      </div></div>
      <div id="typesAll"><div class="type-grid-2">
        <div class="type-btn active" data-type="a3L" onclick="toggleType(this)">3L</div>
        <div class="type-btn active" data-type="a4L" onclick="toggleType(this)">4L</div>
        <div class="type-btn" data-type="a3C" onclick="toggleType(this)">3C</div>
        <div class="type-btn" data-type="a4C" onclick="toggleType(this)">4C</div>
      </div></div>
      <div class="action-row">
        <button class="start-btn" id="startBtn" onclick="startCheck()">&#9654; START</button>
        <button class="stop-btn" onclick="stopCheck()">&#9632; STOP</button>
      </div>
    </div>

    <!-- LISTE MODE -->
    <div id="modeListe" style="display:none">
      <textarea class="inp-area" id="listInput" placeholder="Colle tes pseudos ici&#10;un par ligne&#10;ex: abc&#10;xyz&#10;test"></textarea>
      <div class="action-row">
        <button class="start-btn" id="startListBtn" onclick="startListCheck()">&#9654; CHECKER</button>
        <button class="stop-btn" onclick="stopCheck()">&#9632; STOP</button>
      </div>
    </div>

    <!-- Speed bar -->
    <div class="speed-bar">
      <span>Vitesse</span>
      <span><span class="speed-val" id="speedVal">0</span> pseudos/min</span>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="small-btn blue" onclick="exportResults()">&#8595; Export .txt</button>
      <button class="small-btn" onclick="showHistory()">&#128337; Historique</button>
      <button class="small-btn" onclick="clearResults()">&#128465; Clear</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num blue" id="stChecked">0</div><div class="stat-lbl">Checkés</div></div>
      <div class="stat-box"><div class="stat-num green" id="stAvail">0</div><div class="stat-lbl">Dispos</div></div>
      <div class="stat-box"><div class="stat-num red" id="stTaken">0</div><div class="stat-lbl">Pris</div></div>
      <div class="stat-box"><div class="stat-num yellow" id="stSpeed">0</div><div class="stat-lbl">/ min</div></div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt">En attente...</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-header">
      <div class="right-top">
        <span class="right-title" id="rightTitle">Live · Discord</span>
        <div class="right-actions">
          <span class="right-count" id="rightCount">0 dispos</span>
        </div>
      </div>
    </div>
    <!-- Filter -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">Tout</button>
      <button class="filter-btn" onclick="setFilter('available',this)">✅ Dispos</button>
      <button class="filter-btn" onclick="setFilter('taken',this)">❌ Pris</button>
      <button class="filter-btn" onclick="setFilter('error',this)">⚠️ Erreurs</button>
    </div>
    <div class="results-wrap" id="resultsWrap">
      <div class="empty-state"><div class="empty-icon">&#9889;</div><div class="empty-txt">Lance le checker<br>pour voir les résultats</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const WORKER='https://muddy-thunder-0302.zkrpro902.workers.dev';
const PLABELS={discord:'Discord',guns:'Guns.lol',msa:'MySellAuth',sellix:'Sellix',all:'ALL'};
const PCOLORS={discord:'#5865f2',guns:'#ff6b35',msa:'#9b59ff',sellix:'#4488ff',all:'#00ff88'};
const ALL_PLATS=['discord','guns','msa','sellix'];
let currentPlatform='discord', currentMode='auto', currentFilter='all';
let availableResults=[], allResults=[];
let running=false, stopFlag=false;
let checked=0, avail=0, taken=0;
let speedChecked=0, speedTimer=null, speedVal=0;
let startTs=0;

// ── MODE ──
function switchMode(m){
  currentMode=m;
  document.getElementById('modeAuto').style.display=m==='auto'?'':'none';
  document.getElementById('modeListe').style.display=m==='liste'?'':'none';
  document.getElementById('tabAuto').classList.toggle('active',m==='auto');
  document.getElementById('tabListe').classList.toggle('active',m==='liste');
}

// ── PLATFORM ──
function switchPlatform(p){
  if(running)return;
  currentPlatform=p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.p===p));
  ['Discord','Guns','Msa','Sellix','All'].forEach(n=>{
    const el=document.getElementById('types'+n);
    if(el)el.style.display=(p===n.toLowerCase()||p==='all'&&n==='All')?'':'none';
  });
  document.getElementById('tokenRow').style.display=p==='discord'||p==='all'?'':'none';
  document.getElementById('rightTitle').textContent='Live · '+PLABELS[p];
  clearResults();setStatus('En attente...',false);
}

// ── STORAGE ──
function saveWh(){localStorage.setItem('wh',document.getElementById('webhookInp').value);}
function saveTk(){localStorage.setItem('tk',document.getElementById('tokenInp').value);}
function saveWhConfirm(){saveWh();flash('whBtn');}
function saveTkConfirm(){saveTk();flash('tkBtn');}
function flash(id){const b=document.getElementById(id);const t=b.textContent;b.textContent='✓';b.classList.add('saved');setTimeout(()=>{b.textContent=t;b.classList.remove('saved');},1500);}
function getWh(){return document.getElementById('webhookInp').value.trim()||localStorage.getItem('wh')||'';}
function getTk(){return document.getElementById('tokenInp').value.trim()||localStorage.getItem('tk')||'';}
window.addEventListener('DOMContentLoaded',()=>{
  const wh=localStorage.getItem('wh');if(wh)document.getElementById('webhookInp').value=wh;
  const tk=localStorage.getItem('tk');if(tk)document.getElementById('tokenInp').value=tk;
  // init platform display
  switchPlatform('discord');
});

// ── SOUND ──
function playSound(){
  if(!document.getElementById('soundToggle').checked)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100,1320].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.08);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+i*0.08+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.25);
      o.start(ctx.currentTime+i*0.08);o.stop(ctx.currentTime+i*0.08+0.25);
    });
  }catch{}
}

// ── SPEED ──
function startSpeed(){
  speedChecked=0;speedVal=0;
  startTs=Date.now();
  clearInterval(speedTimer);
  speedTimer=setInterval(()=>{
    const mins=(Date.now()-startTs)/60000||0.0001;
    speedVal=Math.round(speedChecked/mins);
    document.getElementById('speedVal').textContent=speedVal;
    document.getElementById('stSpeed').textContent=speedVal;
  },2000);
}
function stopSpeed(){clearInterval(speedTimer);}

// ── GENERATOR ──
const V=[...'aeiou'],C=[...'bcdfghjklmnpqrstvwxyz'],D=[...'0123456789'],A=[...'abcdefghijklmnopqrstuvwxyz'];
const P3=['CVC','VCC','CCV','CVV'],P4=['CVCC','CCVC','CVVC','CCVV'];
function genByType(type){
  const base=type.replace(/^[gmsa]/,'');
  if(base==='3L')return genPat(P3);
  if(base==='4L')return genPat(P4);
  if(base==='3C')return rnd(A,3);
  if(base==='4C')return rnd(A,4);
  if(base==='4N')return A[~~(Math.random()*A.length)]+[...Array(3)].map(()=>[...A,...D][~~(Math.random()*(A.length+D.length))]).join('');
  if(base==='Semi3L'){let n='';for(const c of P3[~~(Math.random()*P3.length)]){n+=c==='V'?V[~~(Math.random()*V.length)]:(Math.random()<0.3?D[~~(Math.random()*D.length)]:C[~~(Math.random()*C.length)]);}return n;}
  return genPat(P4);
}
function genPat(pats){const p=pats[~~(Math.random()*pats.length)];let n='';for(const c of p)n+=c==='C'?C[~~(Math.random()*C.length)]:V[~~(Math.random()*V.length)];return n;}
function rnd(arr,len){return[...Array(len)].map(()=>arr[~~(Math.random()*arr.length)]).join('');}

function getActiveTypes(){
  const map={discord:'typesDiscord',guns:'typesGuns',msa:'typesMsa',sellix:'typesSellix',all:'typesAll'};
  return[...document.querySelectorAll('#'+map[currentPlatform]+' .type-btn.active')].map(b=>b.dataset.type);
}
function toggleType(el){el.classList.toggle('active');}

// ── CHECKERS ──
async function checkSingle(name,platform){
  if(platform==='discord'){
    try{
      const r=await fetch(WORKER+'/?name='+encodeURIComponent(name),{signal:AbortSignal.timeout(5000)});
      if(!r.ok)return'error';
      const d=await r.json();
      return(d.status==='available'||d.status==='taken')?d.status:'error';
    }catch{return'error';}
  }
  const pm={guns:'guns',msa:'msa',sellix:'sellix'};
  try{
    const r=await fetch(WORKER+'/?'+(pm[platform]||'guns')+'='+encodeURIComponent(name),{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return'error';
    const d=await r.json();
    return(d.status==='available'||d.status==='taken')?d.status:'error';
  }catch{return'error';}
}

async function checkName(name){
  if(currentPlatform==='all'){
    // Check toutes les plateformes en parallèle
    const results=await Promise.all(ALL_PLATS.map(p=>checkSingle(name,p).then(s=>({p,s}))));
    return results;
  }
  const s=await checkSingle(name,currentPlatform);
  return [{p:currentPlatform,s}];
}

// ── WEBHOOK ──
async function sendWh(name,platform){
  const url=getWh();if(!url)return;
  const wColors={discord:3447003,guns:16737845,msa:10181046,sellix:4491519};
  try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Checker',embeds:[{title:'✅ Dispo sur '+PLABELS[platform]+' !',description:'`'+name+'` est libre !',color:wColors[platform]||65416,fields:[{name:'Plateforme',value:PLABELS[platform],inline:true},{name:'Pseudo',value:'`'+name+'`',inline:true}],timestamp:new Date().toISOString()}]})});}catch{}
}

// ── RESULTS UI ──
function setStatus(txt,r){document.getElementById('statusTxt').textContent=txt;document.getElementById('statusDot').className='status-dot'+(r?' running':'');}
function updateStats(){
  document.getElementById('stChecked').textContent=checked;
  document.getElementById('stAvail').textContent=avail;
  document.getElementById('stTaken').textContent=taken;
  document.getElementById('rightCount').textContent=avail+' dispos';
}

function addResult(name,status,platform){
  const obj={name,status,platform};
  allResults.push(obj);
  if(status==='available'){
    availableResults.push(obj);
    const existing=availableResults.filter(r=>r.name===name&&r.platform===platform);
    if(existing.length===1){sendWh(name,platform);playSound();}
  }
  if(currentFilter!=='all'&&currentFilter!==status)return;
  renderResultItem(obj,true);
}

function renderResultItem(obj,prepend){
  const wrap=document.getElementById('resultsWrap');
  // Remove empty state
  const emp=wrap.querySelector('.empty-state');if(emp)emp.remove();
  const item=document.createElement('div');
  item.className='result-item '+obj.status;
  item.dataset.status=obj.status;
  const labels={available:'DISPO',taken:'PRIS',error:'ERR'};
  const pc=PCOLORS[obj.platform]||'#888';
  item.innerHTML=`<div class="result-left"><span class="result-name">${obj.name}</span><span class="result-plat" style="background:${pc}22;color:${pc}">${PLABELS[obj.platform]||obj.platform}</span></div><span class="result-badge">${labels[obj.status]||'ERR'}</span>`;
  if(obj.status==='available')item.onclick=()=>copyName(obj.name);
  if(prepend&&obj.status==='available')wrap.insertBefore(item,wrap.firstChild);
  else wrap.appendChild(item);
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Re-render
  const wrap=document.getElementById('resultsWrap');
  wrap.innerHTML='';
  const toShow=f==='all'?allResults:allResults.filter(r=>r.status===f);
  if(!toShow.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#9889;</div><div class="empty-txt">Aucun résultat</div></div>';return;}
  toShow.forEach(r=>renderResultItem(r,false));
}

function clearResults(){
  checked=0;avail=0;taken=0;availableResults=[];allResults=[];
  updateStats();
  document.getElementById('resultsWrap').innerHTML='<div class="empty-state"><div class="empty-icon">&#9889;</div><div class="empty-txt">Lance le checker<br>pour voir les résultats</div></div>';
}

// ── AUTO CHECK ──
async function startCheck(){
  if(running)return;
  const types=getActiveTypes();
  if(!types.length){alert('Sélectionne au moins un type !');return;}
  running=true;stopFlag=false;clearResults();
  document.getElementById('startBtn').disabled=true;
  setStatus('Checking...',true);
  startSpeed();
  const autoStop=document.getElementById('stopToggle').checked;
  const stopAt=parseInt(document.getElementById('stopAt').value)||5;

  while(!stopFlag){
    if(autoStop&&avail>=stopAt){stopFlag=true;break;}
    const batch=[];
    for(let i=0;i<5;i++){
      const type=types[~~(Math.random()*types.length)];
      const name=genByType(type);
      batch.push((async()=>{
        const results=await checkName(name);
        for(const {p,s} of results){
          checked++;speedChecked++;
          if(s==='available')avail++;
          else if(s==='taken')taken++;
          addResult(name,s,p);
        }
        updateStats();
        setStatus('"'+name+'" · '+avail+' dispo',true);
      })());
    }
    await Promise.all(batch);
    await new Promise(r=>setTimeout(r,400));
  }
  running=false;stopSpeed();
  document.getElementById('startBtn').disabled=false;
  setStatus('Arrêté · '+avail+' dispo / '+checked+' checkés',false);
  saveHistory();
}

// ── LIST CHECK ──
async function startListCheck(){
  if(running)return;
  const raw=document.getElementById('listInput').value;
  const names=[...new Set(raw.split('\n').map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2&&s.length<=32))];
  if(!names.length){alert('Colle au moins un pseudo !');return;}
  running=true;stopFlag=false;clearResults();
  document.getElementById('startListBtn').disabled=true;
  setStatus('Checking liste...',true);
  startSpeed();
  for(let i=0;i<names.length&&!stopFlag;i+=5){
    const batch=names.slice(i,i+5).map(name=>(async()=>{
      const results=await checkName(name);
      for(const {p,s} of results){
        checked++;speedChecked++;
        if(s==='available')avail++;
        else if(s==='taken')taken++;
        addResult(name,s,p);
      }
      updateStats();
      setStatus((i+5)+'/'+names.length+' · '+avail+' dispo',true);
    })());
    await Promise.all(batch);
    await new Promise(r=>setTimeout(r,400));
  }
  running=false;stopSpeed();
  document.getElementById('startListBtn').disabled=false;
  setStatus('Terminé · '+avail+' dispo sur '+names.length,false);
  saveHistory();
}

function stopCheck(){stopFlag=true;setStatus('Arrêt...',false);}

// ── EXPORT ──
function exportResults(){
  if(!availableResults.length){showToast('Aucun dispo à exporter !');return;}
  const lines=availableResults.map(r=>r.name+'\t'+PLABELS[r.platform]).join('\n');
  const blob=new Blob(['Pseudo\tPlateforme\n'+lines],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dispos_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  showToast('Export OK ! '+availableResults.length+' pseudos');
}

// ── HISTORY ──
function saveHistory(){
  if(!availableResults.length)return;
  const sessions=JSON.parse(localStorage.getItem('sessions')||'[]');
  sessions.unshift({date:new Date().toLocaleString('fr'),platform:currentPlatform,avail:avail,checked:checked,names:availableResults.map(r=>r.name).slice(0,10)});
  if(sessions.length>20)sessions.pop();
  localStorage.setItem('sessions',JSON.stringify(sessions));
}

function showHistory(){
  const sessions=JSON.parse(localStorage.getItem('sessions')||'[]');
  const wrap=document.getElementById('resultsWrap');
  if(!sessions.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#128337;</div><div class="empty-txt">Aucun historique</div></div>';return;}
  wrap.innerHTML='<div class="hist-panel">'+sessions.map((s,i)=>`
    <div class="hist-session" onclick="loadSession(${i})">
      <div class="hist-top">
        <span class="hist-date">${s.date}</span>
        <span class="hist-stats">&#10003; ${s.avail} / ${s.checked}</span>
      </div>
      <div class="hist-names">${(s.names||[]).join(', ')}${s.names&&s.names.length===10?'...':''}</div>
    </div>`).join('')+'</div>';
}

function loadSession(i){
  const sessions=JSON.parse(localStorage.getItem('sessions')||'[]');
  const s=sessions[i];if(!s)return;
  document.getElementById('listInput').value=s.names.join('\n');
  switchMode('liste');
  showToast('Session chargée dans la liste !');
}

// ── COPY ──
function copyName(name){
  navigator.clipboard.writeText(name).catch(()=>{const t=document.createElement('textarea');t.value=name;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
  showToast('"'+name+'" copié !');
}
function showToast(msg){
  const toast=document.getElementById('toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);
}
function toggleStopAt(){
  document.getElementById('stopToggle').checked=!document.getElementById('stopToggle').checked;
}
